# ============================================================
# HireFlow — Kubernetes Deployment
# Team 02 | Sprint #3 | Assignment 4.17
# ============================================================
# The Deployment declares the DESIRED STATE of the application.
# Kubernetes continuously ensures the current state matches.
#
# Cloud-native responsibilities taken over by Kubernetes:
#   - Restarting crashed containers (self-healing)
#   - Spreading pods across nodes (distribution)
#   - Rolling updates with zero downtime
#   - Scaling replicas up and down
#
# Developer responsibilities remain:
#   - Writing the application code
#   - Building the Docker image
#   - Writing this manifest (declaring desired state)
#   - Defining health check endpoints (/health)
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: hireflow
  namespace: recruitment
  labels:
    app: hireflow
    team: team-02
    version: v2.4.1
spec:

  # ── Desired State ────────────────────────────────────────
  # Kubernetes ensures exactly 3 pods run at all times.
  # If one crashes → K8s creates a replacement automatically.
  # During hiring surge → HPA increases this to up to 10.
  replicas: 3

  selector:
    matchLabels:
      app: hireflow

  # ── Rolling Update Strategy ──────────────────────────────
  # Cloud-native principle: updates must not cause downtime.
  # maxUnavailable: 1 → at most 1 pod offline during update
  # maxSurge: 1       → at most 1 extra pod during update
  # Result: form version updates deploy with zero downtime
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  template:
    metadata:
      labels:
        app: hireflow
        version: v2.4.1
    spec:
      containers:
      - name: hireflow
        # Image built by CI pipeline, tagged with version
        # Kubernetes pulls this from Docker Hub registry
        image: abhich98/hireflow-backend:v2.4.1

        ports:
        - containerPort: 3000
          name: http

        # ── Config Injection ─────────────────────────────
        # Cloud-native: config comes from outside the image.
        # Same image runs in dev/staging/prod with diff config.
        env:
        - name: FORM_VERSION
          valueFrom:
            configMapKeyRef:
              name: hireflow-config
              key: FORM_VERSION
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: hireflow-config
              key: NODE_ENV
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: hireflow-config
              key: PORT

        # ── Liveness Probe ───────────────────────────────
        # Kubernetes responsibility: detect and restart
        # unhealthy containers automatically.
        # Developer responsibility: implement /health endpoint
        # that returns 200 when app is functioning correctly.
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 3
          failureThreshold: 3

        # ── Readiness Probe ──────────────────────────────
        # Kubernetes responsibility: only route traffic to
        # pods that are ready to serve requests.
        # Prevents errors during pod startup or restarts.
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3

        # ── Resource Limits ──────────────────────────────
        # Kubernetes responsibility: enforce resource boundaries.
        # Prevents one pod from consuming all node resources.
        # During 8000+ application surge, this ensures
        # fair distribution across all pods.
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"